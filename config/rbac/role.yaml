---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - persistentvolumeclaims
  - secrets
  - services
  verbs:
  - create
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - pods/log
  verbs:
  - get
- apiGroups:
  - apps
  resources:
  - statefulsets
  verbs:
  - create
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps
  resources:
  - statefulsets/status
  verbs:
  - get
- apiGroups:
  - db.mrhachi.dev
  resources:
  - singletenantmongodbs
  verbs:
  - create
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - db.mrhachi.dev
  resources:
  - singletenantmongodbs/finalizers
  verbs:
  - update
- apiGroups:
  - db.mrhachi.dev
  resources:
  - singletenantmongodbs/status
  verbs:
  - get
  - patch
  - update
