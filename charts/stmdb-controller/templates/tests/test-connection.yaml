apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "mongodb-controller.fullname" . }}-test-connection"
  labels:
    {{- include "mongodb-controller.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['{{ include "mongodb-controller.fullname" . }}:8443']
  restartPolicy: Never
