apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    {{- include "mongodb-controller.labels" . | nindent 4 }}
  name: {{ include "mongodb-controller.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  labels:
    {{- include "mongodb-controller.labels" . | nindent 4 }}
  name: {{ include "mongodb-controller.name" . }}-leader-election-role
  namespace: {{ .Release.Namespace }}
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "mongodb-controller.name" . }}-manager-role
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - persistentvolumeclaims
  - secrets
  - services
  verbs:
  - create
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - pods/log
  verbs:
  - get
- apiGroups:
  - apps
  resources:
  - statefulsets
  verbs:
  - create
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps
  resources:
  - statefulsets/status
  verbs:
  - get
- apiGroups:
  - db.mrhachi.dev
  resources:
  - singletenantmongodbs
  verbs:
  - create
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - db.mrhachi.dev
  resources:
  - singletenantmongodbs/finalizers
  verbs:
  - update
- apiGroups:
  - db.mrhachi.dev
  resources:
  - singletenantmongodbs/status
  verbs:
  - get
  - patch
  - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "mongodb-controller.name" . }}-metrics-auth-role
rules:
- apiGroups:
  - authentication.k8s.io
  resources:
  - tokenreviews
  verbs:
  - create
- apiGroups:
  - authorization.k8s.io
  resources:
  - subjectaccessreviews
  verbs:
  - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "mongodb-controller.name" . }}-metrics-reader
rules:
- nonResourceURLs:
  - /metrics
  verbs:
  - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    {{- include "mongodb-controller.labels" . | nindent 4 }}
  name: {{ include "mongodb-controller.name" . }}-singletenantmongodb-admin-role
rules:
- apiGroups:
  - db.mrhachi.dev
  resources:
  - singletenantmongodbs
  verbs:
  - '*'
- apiGroups:
  - db.mrhachi.dev
  resources:
  - singletenantmongodbs/status
  verbs:
  - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    {{- include "mongodb-controller.labels" . | nindent 4 }}
  name: {{ include "mongodb-controller.name" . }}-singletenantmongodb-editor-role
rules:
- apiGroups:
  - db.mrhachi.dev
  resources:
  - singletenantmongodbs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - db.mrhachi.dev
  resources:
  - singletenantmongodbs/status
  verbs:
  - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    {{- include "mongodb-controller.labels" . | nindent 4 }}
  name: {{ include "mongodb-controller.name" . }}-singletenantmongodb-viewer-role
rules:
- apiGroups:
  - db.mrhachi.dev
  resources:
  - singletenantmongodbs
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - db.mrhachi.dev
  resources:
  - singletenantmongodbs/status
  verbs:
  - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    {{- include "mongodb-controller.labels" . | nindent 4 }}
  name: {{ include "mongodb-controller.name" . }}-leader-election-rolebinding
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "mongodb-controller.name" . }}-leader-election-role
subjects:
- kind: ServiceAccount
  name: {{ include "mongodb-controller.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    {{- include "mongodb-controller.labels" . | nindent 4 }}
  name: {{ include "mongodb-controller.name" . }}-manager-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "mongodb-controller.name" . }}-manager-role
subjects:
- kind: ServiceAccount
  name: {{ include "mongodb-controller.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "mongodb-controller.name" . }}-metrics-auth-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "mongodb-controller.name" . }}-metrics-auth-role
subjects:
- kind: ServiceAccount
  name: {{ include "mongodb-controller.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
